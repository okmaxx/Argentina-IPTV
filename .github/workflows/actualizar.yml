name: Actualizar IPTV y EPG Argentina

on:
  schedule:
    # Se ejecuta todos los días a las 07:00 UTC (04:00 AM de Argentina)
    - cron: '0 7 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente

permissions:
  contents: write # 👈 ESTO le da permiso al bot para guardar los archivos generados

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # 👈 Corregido el error de tipeo aquí

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar script de actualización
      run: python scripts/actualizar_listas.py

    - name: Guardar cambios en el repositorio
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatización: Listas y EPG actualizadas 🚀" && git push)
